version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: medicatalogue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicatalogue123}
      POSTGRES_DB: ${POSTGRES_DB:-medicatalogue}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediadmin -d medicatalogue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
